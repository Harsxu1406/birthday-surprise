<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            background-color: #141414;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            overflow-x: hidden;
            user-select: none;
        }

        /* --- INTRO ANIMATION SCREEN --- */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease-out;
        }
        .netflix-logo-anim {
            color: #e50914;
            font-size: 8rem;
            font-weight: 900;
            letter-spacing: 5px;
            animation: zoomIn 3s forwards;
        }
        @keyframes zoomIn {
            0% { transform: scale(0.5); opacity: 0; }
            30% { opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; display: none; }
        }

        /* --- PROFILE SELECTION SCREEN --- */
        #profile-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #141414;
            display: none; /* Shown after intro */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 500;
        }
        #profile-screen h1 {
            font-size: 3vw;
            font-weight: 400;
            margin-bottom: 2rem;
        }
        .profiles {
            display: flex;
            gap: 30px;
        }
        .profile {
            text-align: center;
            cursor: pointer;
        }
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 4px;
            border: 3px solid transparent;
            transition: 0.3s;
            /* YOUR PROFILE PICTURE LINK APPLIED HERE */
            background: url('https://drive.google.com/uc?export=view&id=1WyYXuYl1KI93y2Ha0b9xAOn1kXjGUbP8') center/cover;
        }
        .profile:hover .profile-img { border-color: white; }
        .profile-name {
            margin-top: 15px;
            color: gray;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        .profile:hover .profile-name { color: white; }

        /* --- MAIN HOME SCREEN --- */
        #main-screen {
            display: none; /* Shown after profile selection */
            opacity: 0;
            transition: opacity 1s ease-in;
        }
        header {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 40px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 100;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
        }
        .logo {
            color: #e50914;
            font-size: 2rem;
            font-weight: 900;
        }

        /* Hero Slideshow */
        .hero {
            height: 80vh;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            position: relative;
            background-size: cover !important;
            background-position: center top !important;
            transition: background-image 1s ease-in-out;
        }
        /* Gradient overlay for readability */
        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, #141414 10%, transparent 60%),
                        linear-gradient(to top, #141414 5%, transparent 40%);
            z-index: 1;
        }
        .hero-content {
            position: relative;
            z-index: 2;
            padding-bottom: 50px;
        }
        .hero h1 { font-size: 4rem; margin: 0 0 10px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .hero p { font-size: 1.2rem; max-width: 600px; color: #fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        .btn {
            background-color: white; color: black;
            padding: 10px 30px; border: none; font-size: 1.2rem;
            cursor: pointer; border-radius: 4px; font-weight: bold;
            margin-top: 20px; transition: 0.2s;
        }
        .btn:hover { background-color: rgba(255,255,255,0.7); }

        /* Movie Rows */
        .row { padding: 0 40px 40px 40px; position: relative; z-index: 2; }
        .row h2 { font-size: 1.4rem; margin-bottom: 15px; }
        .cards { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px; }
        .cards::-webkit-scrollbar { display: none; } /* Hide scrollbar */
        
        .card {
            min-width: 250px; height: 140px;
            background-color: #333; border-radius: 4px;
            transition: transform 0.4s ease; cursor: pointer;
            position: relative;
        }
        .card:hover { transform: scale(1.15); z-index: 10; box-shadow: 0px 0px 20px rgba(0,0,0,0.8); }
        
        /* Banner Images - PLACEHOLDERS FOR NOW */
        .banner1 { background: url('https://images.unsplash.com/photo-1513151233558-d860c5398176?q=80&w=1000') center/cover; }
