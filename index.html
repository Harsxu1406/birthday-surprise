<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SurpriseFlix</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            background-color: #141414;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent; 
        }

        /* --- INTRO ANIMATION SCREEN --- */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100dvh;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease-out;
        }
        .netflix-logo-anim {
            color: #e50914;
            font-size: 15vw; 
            font-weight: 900;
            letter-spacing: 5px;
            animation: zoomIn 3s forwards;
        }
        @keyframes zoomIn {
            0% { transform: scale(0.5); opacity: 0; }
            30% { opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; display: none; }
        }

        /* --- PROFILE SELECTION SCREEN --- */
        #profile-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100dvh;
            background-color: #141414;
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 500;
        }
        #profile-screen h1 {
            font-size: 1.8rem;
            font-weight: 400;
            margin-bottom: 2rem;
            text-align: center;
        }
        .profiles {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .profile {
            text-align: center;
            cursor: pointer;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 3px solid transparent;
            transition: 0.3s;
            background: url('1.jpg') center/cover;
        }
        .profile:active .profile-img { border-color: white; }
        .profile-name {
            margin-top: 10px;
            color: gray;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .profile:active .profile-name { color: white; }

        /* --- MAIN HOME SCREEN --- */
        #main-screen {
            display: none; 
            opacity: 0;
            transition: opacity 1s ease-in;
            padding-bottom: 30px;
        }
        header {
            position: fixed;
            top: 0; width: 100%;
            padding: 15px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }
        .logo {
            color: #e50914;
            font-size: 1.5rem;
            font-weight: 900;
        }

        /* Hero Slideshow */
        .hero {
            height: 70dvh; 
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            position: relative;
            background-size: cover !important; 
            background-position: center top !important;
            background-repeat: no-repeat !important;
            transition: background-image 1s ease-in-out;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, #141414 5%, transparent 60%);
            z-index: 1;
        }
        .hero-content {
            position: relative;
            z-index: 2;
            padding-bottom: 20px;
            text-align: center; 
        }
        .hero h1 { 
            font-size: 2.5rem; 
            margin: 0 0 10px 0; 
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8); 
        }
        .hero p { 
            font-size: 1rem; 
            margin: 0 auto;
            max-width: 90%; 
            color: #fff; 
            text-shadow: 1px 1px 4px rgba(0,0,0,0.9); 
        }
        .btn {
            background-color: white; color: black;
            padding: 12px 35px; border: none; font-size: 1.1rem;
            cursor: pointer; border-radius: 4px; font-weight: bold;
            margin-top: 15px; transition: 0.2s;
        }
        .btn:active { background-color: rgba(255,255,255,0.7); }

        /* Movie Rows */
        .row { padding: 10px 0 0 0; position: relative; z-index: 2; }
        .row h2 { font-size: 1.2rem; margin: 0 0 10px 20px; }
        .cards { 
            display: flex; 
            gap: 12px; 
            overflow-x: auto; 
            padding: 0 20px 20px 20px; 
            scroll-snap-type: x mandatory; 
            -webkit-overflow-scrolling: touch;
        }
        .cards::-webkit-scrollbar { display: none; } 
        
        /* THE 3 PICTURE CARDS */
        .card {
            min-width: 130px; 
            height: 195px; 
            background-color: #222; 
            border-radius: 6px;
            transition: transform 0.2s ease; cursor: pointer;
            position: relative;
            scroll-snap-align: start;
        }
        .card:active { transform: scale(0.95); }
        
        /* PICTURE BANNER IMAGES */
        .banner1 { background: url('7.jpeg') center/cover; }
        .banner2 { background: url('8.jpeg') center/cover; }
        .banner3 { background: url('13.jpeg') center/cover; }
        
        .card-info {
            display: flex; align-items: flex-end; justify-content: center;
            position: absolute; bottom: 0; left: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            width: 100%; height: 50%; padding: 10px; box-sizing: border-box; text-align: center;
            font-weight: bold; color: #fff; font-size: 0.8rem;
        }

        /* THE 4TH VIDEO CARD */
        .video-card {
            min-width: 200px; /* Made it a bit wider to look like a feature video */
            height: 195px; 
            background-color: #000; 
            border-radius: 6px;
            scroll-snap-align: start;
            position: relative;
            overflow: hidden; /* Keeps video inside the rounded corners */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .video-card video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            outline: none;
        }

        /* --- MODAL / POPUP --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 200;
            justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box;
        }
        .modal-content {
            background: #181818; padding: 30px 20px; border-radius: 10px;
            width: 100%; max-width: 400px; text-align: center; position: relative;
            box-shadow: 0px 0px 30px rgba(229, 9, 20, 0.4); border: 1px solid #333;
        }
        .close {
            position: absolute; top: 10px; right: 15px; font-size: 2rem;
            cursor: pointer; color: #aaa; transition: 0.2s;
        }
        .close:active { color: white; }
        #modal-title { color: #e50914; margin-top: 0; margin-bottom: 10px; font-size: 1.4rem; }
        #modal-message { line-height: 1.5; font-size: 1rem; margin: 0; }

    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="netflix-logo-anim">NETFLIX</div>
    </div>

    <div id="profile-screen">
        <h1>Who's watching?</h1>
        <div class="profiles">
            <div class="profile" onclick="enterMainScreen()">
                <div class="profile-img"></div>
                <div class="profile-name">Birthday Girl ❤️</div>
            </div>
            <div class="profile">
                <div class="profile-img" style="background: url('https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png') center/cover;"></div>
                <div class="profile-name">Guest</div>
            </div>
        </div>
    </div>

    <div id="main-screen">
        <header>
            <div class="logo">NETFLIX</div>
            <div class="profile-icon" style="width:32px; height:32px; background: url('profile.jpg') center/cover; border-radius:4px;"></div>
        </header>

        <div class="hero" id="hero-slider">
            <div class="hero-content">
                <h1>Happy Birthday!</h1>
                <p>A beautifully unscripted journey. Starring you, loved by me. Enjoy your special day!</p>
                <button class="btn" onclick="openModal('Play Surprise!', 'Let the celebrations begin! I hope this year brings you endless joy and happiness. I love you!')">▶ Play</button>
            </div>
        </div>

        <div class="row">
            <h2>Our Memories (Swipe 👉)</h2>
            <div class="cards">
                
                <div class="card banner1" onclick="openModal('Your Title Here', 'Your custom message goes right here.')">
                    <div class="card-info">Tap to View</div>
                </div>
                
                <div class="card banner2" onclick="openModal('Your Title Here', 'Your custom message goes right here.')">
                    <div class="card-info">Tap to View</div>
                </div>
                
                <div class="card banner3" onclick="openModal('Your Title Here', 'Your custom message goes right here.')">
                    <div class="card-info">Tap to View</div>
                </div>
                 
                 <div class="video-card">
                    <video controls poster="10.jpeg">
                        <source src="15.mp4" type="video/mp4">
                    </video>
                </div>

            </div>
        </div>
    </div>

    <div id="surpriseModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modal-title">Title</h2>
            <p id="modal-message">Message goes here.</p>
        </div>
    </div>

    <script>
        // --- Intro Logic ---
        setTimeout(() => {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('profile-screen').style.display = 'flex';
        }, 3000);

        function enterMainScreen() {
            document.getElementById('profile-screen').style.display = 'none';
            const mainScreen = document.getElementById('main-screen');
            mainScreen.style.display = 'block';
            
            setTimeout(() => {
                mainScreen.style.opacity = '1';
            }, 50);

            startSlideshow();
        }

        // --- Slideshow Logic ---
        // Uses your 5.jpg, 6.jpg, 4.jpg
        const slideImages = [
            "url('5.jpg')",
            "url('6.jpg')",
            "url('4.jpg')"
        ]; 

        let currentSlide = 0;
        function startSlideshow() {
            const hero = document.getElementById('hero-slider');
            hero.style.backgroundImage = slideImages[0]; 
            
            setInterval(() => {
                currentSlide = (currentSlide + 1) % slideImages.length;
                hero.style.backgroundImage = slideImages[currentSlide];
            }, 4000); 
        }

        // --- Modal & Confetti Logic ---
        function openModal(title, message) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            document.getElementById('surpriseModal').style.display = 'flex';
            
            var duration = 2 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 201 };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) { return clearInterval(interval); }
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount,
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }
                }));
                confetti(Object.assign({}, defaults, { particleCount,
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }
                }));
            }, 250);
        }

        function closeModal() {
            document.getElementById('surpriseModal').style.display = 'none';
        }
    </script>
</body>
</html>
