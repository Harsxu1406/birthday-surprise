<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;600&display=swap');

        :root {
            --bg-color: #0f0c1b;
            --card-bg: #1a162b;
            --accent: #ff4d85;
            --text-main: #ffffff;
            --text-muted: #a8a3bb;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* Outer background for desktop viewers */
            font-family: 'Poppins', sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Forces a mobile aspect ratio even if viewed on a computer */
        .mobile-wrapper {
            max-width: 480px;
            margin: 0 auto;
            background-color: var(--bg-color);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 50px rgba(255, 77, 133, 0.1);
        }

        /* --- HEADER --- */
        .header {
            padding: 30px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: linear-gradient(to bottom, rgba(15,12,27,1) 60%, transparent);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .profile-pic {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: url('profile.jpg') center/cover;
            border: 2px solid var(--accent);
            box-shadow: 0 0 15px rgba(255, 77, 133, 0.4);
        }
        .header-text h1 {
            font-family: 'Playfair Display', serif;
            margin: 0;
            font-size: 1.4rem;
            color: var(--accent);
        }
        .header-text p {
            margin: 0;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* --- HERO SECTION --- */
        .hero {
            padding: 0 20px 20px 20px;
            text-align: center;
        }
        .hero h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin: 0 0 10px 0;
        }
        .hero p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        /* --- FEED / CARDS --- */
        .feed {
            padding: 0 20px 100px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .memory-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .memory-card:active {
            transform: scale(0.98);
        }
        /* Automatically handles portrait photos perfectly */
        .memory-img {
            width: 100%;
            display: block;
            object-fit: cover;
        }
        .card-label {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-label::after {
            content: '👆 Tap to open';
            font-size: 0.7rem;
            color: var(--accent);
            font-weight: 400;
        }

        /* --- BIG FINALE BUTTON --- */
        .btn-celebrate {
            background: linear-gradient(45deg, #ff4d85, #ff7b54);
            color: white;
            border: none;
            padding: 18px;
            width: calc(100% - 40px);
            margin: 0 20px 40px 20px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(255, 77, 133, 0.4);
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }
        .btn-celebrate:active { transform: scale(0.95); }

        /* --- SLIDE-UP MODAL (APP STYLE) --- */
        .bottom-sheet {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            background-color: var(--card-bg);
            border-radius: 30px 30px 0 0;
            box-sizing: border-box;
            padding: 30px;
            z-index: 100;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
        }
        .bottom-sheet.active {
            bottom: 0;
        }
        .sheet-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(3px);
            z-index: 99;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .sheet-overlay.active {
            display: block;
            opacity: 1;
        }
        .drag-handle {
            width: 50px;
            height: 5px;
            background-color: #3a3553;
            border-radius: 10px;
            margin: 0 auto 20px auto;
        }
        .sheet-title {
            font-family: 'Playfair Display', serif;
            color: var(--accent);
            font-size: 1.8rem;
            margin: 0 0 15px 0;
        }
        .sheet-message {
            font-size: 1rem;
            line-height: 1.6;
            color: #d1cde0;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="mobile-wrapper">
        
        <div class="header">
            <div class="profile-pic"></div>
            <div class="header-text">
                <h1>Happy Birthday</h1>
                <p>A special collection just for you.</p>
            </div>
        </div>

        <div class="hero">
            <h2>To My Favorite Person</h2>
            <p>Every moment with you is a memory worth keeping. Scroll down to see a few of my favorites.</p>
        </div>

        <div class="feed">
            
            <div class="memory-card" onclick="openSheet('Where it Started', 'I still remember this day perfectly. It was the beginning of my favorite chapter of life. Happy birthday to the girl who changed everything.')">
                <img src="1.jpg" class="memory-img" alt="Memory 1">
                <div class="card-label">Chapter One</div>
            </div>

            <div class="memory-card" onclick="openSheet('My Favorite Smile', 'Every time I look at this picture, it makes me smile. Your happiness is literally my favorite thing in the world.')">
                <img src="2.jpg" class="memory-img" alt="Memory 2">
                <div class="card-label">Pure Joy</div>
            </div>

            <div class="memory-card" onclick="openSheet('Unforgettable Adventures', 'No matter where we go or what we do, as long as I am with you, I am having the time of my life.')">
                <img src="3.jpg" class="memory-img" alt="Memory 3">
                <div class="card-label">Best Times</div>
            </div>

        </div>

        <button class="btn-celebrate" onclick="fireConfetti()">🎁 Tap for Final Surprise 🎁</button>

        <div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>
        <div class="bottom-sheet" id="sheet">
            <div class="drag-handle" onclick="closeSheet()"></div>
            <h3 class="sheet-title" id="sheetTitle">Title</h3>
            <p class="sheet-message" id="sheetMessage">Message goes here.</p>
        </div>

    </div>

    <script>
        // Logic for sliding up the messages
        const sheet = document.getElementById('sheet');
        const overlay = document.getElementById('overlay');
        const titleEl = document.getElementById('sheetTitle');
        const msgEl = document.getElementById('sheetMessage');

        function openSheet(title, message) {
            titleEl.innerText = title;
            msgEl.innerText = message;
            
            overlay.classList.add('active');
            sheet.classList.add('active');
        }

        function closeSheet() {
            sheet.classList.remove('active');
            setTimeout(() => {
                overlay.classList.remove('active');
            }, 300); // Wait for sheet to slide down before hiding overlay
        }

        // Logic for the Confetti Explosion
        function fireConfetti() {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 40, spread: 360, ticks: 60, zIndex: 1000 };

            function randomInRange(min, max) {
              return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
              var timeLeft = animationEnd - Date.now();

              if (timeLeft <= 0) {
                return clearInterval(interval);
              }

              var particleCount = 50 * (timeLeft / duration);
              // Fire from both sides
              confetti(Object.assign({}, defaults, { particleCount,
                origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }
              }));
              confetti(Object.assign({}, defaults, { particleCount,
                origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }
              }));
            }, 250);

            // Pop up a final sweet message after confetti starts
            setTimeout(() => {
                openSheet("Happy Birthday! 🎈", "I love you so much. I hope you have the most incredible day today, you deserve the world!");
            }, 500);
        }
    </script>

</body>
</html>
